# VOICER — Render Blueprint (one-click deploy del backend FastAPI)
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: voicer-api
    runtime: python
    region: oregon  # US West — más cerca de NVIDIA gRPC (nvcf.nvidia.com)
    plan: free
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false  # El usuario la configura manualmente en el dashboard de Render
      - key: PYTHON_VERSION
        value: 3.11.11
